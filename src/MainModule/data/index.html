<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Power Distribution Unit</title>
<style>
  body { font-family: 'Segoe UI', Roboto, Arial, sans-serif; background:#f7f9fb; margin:0; color:#222; }
  header { background:#0078d7; color:#fff; padding:18px; text-align:center; font-size:1.4rem; font-weight:600; box-shadow:0 2px 6px rgba(0,0,0,0.08); }
  main { max-width:1100px; margin:20px auto; padding:10px; }
  .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(320px,1fr)); gap:16px; }

  .module-card { background:#fff; border-radius:12px; padding:16px; box-shadow:0 1px 6px rgba(0,0,0,0.06); }
  .module-card h2 { margin:0 0 8px 0; color:#0078d7; font-size:1.1rem; }
  table { width:100%; border-collapse:collapse; margin-top:8px; }
  th, td { text-align:center; padding:8px; border-bottom:1px solid #eee; }
  .relay-row { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin-top:10px; }
  .relay-btn { border:none; padding:8px 14px; border-radius:18px; cursor:pointer; font-weight:700; min-width:72px; }
  .relay-on { background:#00a651; color:#fff; }
  .relay-off { background:#d9534f; color:#fff; }
  .info-table th { text-align:left; padding-right:12px; border-bottom:none; }
  .info-table td { text-align:left; border-bottom:none; }
  .small { font-size:0.9rem; color:#666; }
</style>
</head>
<body>
<header>Power Distribution Unit - Multi IEC Monitor</header>
<main>
  <div id="status" class="small" style="text-align:center; margin-bottom:12px;">Connecting...</div>

  <div id="modules" class="grid"></div>
</main>

<script>
async function fetchJson(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error("HTTP error " + r.status);
  return await r.json();
}

function makeRelayButton(state, modId, relayIndex) {
  const btn = document.createElement('button');
  btn.className = 'relay-btn ' + (state ? 'relay-on' : 'relay-off');
  btn.textContent = state ? 'ON' : 'OFF';
  btn.onclick = async () => {
    try {
      await fetch(`/api/module/${modId}/relay/${relayIndex}/toggle`);
      // kis késleltetés, hogy a backend frissítse az állapotot, majd újratöltjük
      setTimeout(loadData, 200);
    } catch (e) {
      console.error(e);
      alert('Hiba a relay váltásnál');
    }
  };
  return btn;
}

async function loadData() {
  const statusEl = document.getElementById('status');
  try {
    const modules = await fetchJson('/api/data');
    statusEl.textContent = 'OK - utolsó frissítés: ' + new Date().toLocaleTimeString();
    const container = document.getElementById('modules');
    container.innerHTML = '';

    if (!Array.isArray(modules) || modules.length === 0) {
      container.innerHTML = '<div class="module-card"><p>No IEC modules found.</p></div>';
      return;
    }

    modules.forEach(m => {
      const card = document.createElement('section');
      card.className = 'module-card';

      const title = document.createElement('h2');
      title.textContent = 'Module ID: ' + m.modbus_id + '  (' + (m.version || '') + ')';
      card.appendChild(title);

      // Consumption table
      const tbl = document.createElement('table');
      tbl.innerHTML = `<tr><th>Voltage (V)</th><th>Current (A)</th><th>Power (W)</th></tr>
                       <tr><td>${(m.voltage !== undefined) ? m.voltage.toFixed(1) : '--'}</td>
                           <td>${(m.current !== undefined) ? m.current.toFixed(2) : '--'}</td>
                           <td>${(m.power !== undefined) ? m.power.toFixed(1) : '--'}</td></tr>`;
      card.appendChild(tbl);

      // Relays
      const relDiv = document.createElement('div');
      relDiv.innerHTML = '<h3 style="margin-top:10px;margin-bottom:6px;">Relay States</h3>';
      const relayRow = document.createElement('div');
      relayRow.className = 'relay-row';
      if (Array.isArray(m.relays) && m.relays.length > 0) {
        m.relays.forEach((st, ridx) => {
          relayRow.appendChild(makeRelayButton(st, m.modbus_id, ridx));
        });
      } else {
        relayRow.textContent = 'No relays';
      }
      relDiv.appendChild(relayRow);
      card.appendChild(relDiv);

      // Info
      const infoTbl = document.createElement('table');
      infoTbl.className = 'info-table';
      infoTbl.innerHTML = `<tr><th>ID:</th><td>${m.id}</td><th>Available LEDs:</th><td>${m.available_leds}</td></tr>
                           <tr><th>Current limit:</th><td>${m.current_limit}</td><th>Relay count:</th><td>${m.relay_count}</td></tr>
                           <tr><th>Current measured:</th><td>${m.is_current_measured ? 'Yes' : 'No'}</td>
                           <th>Voltage measured:</th><td>${m.is_voltage_measured ? 'Yes' : 'No'}</td></tr>`;
      card.appendChild(infoTbl);

      container.appendChild(card);
    });

  } catch (e) {
    statusEl.textContent = 'Hiba a szerver elérésében';
    console.error(e);
  }
}

setInterval(loadData, 2000);
loadData();
</script>
</body>
</html>
